<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarketPOS Admin Giriş</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <span class="login-badge">Korumalı Alan</span>
      <h1>Admin Paneline Giriş</h1>
      <p>Yönetici hesabınızla giriş yapın.</p>
      
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Kullanıcı Adı</label>
          <input type="text" id="username" name="username" placeholder="Kullanıcı adını gir" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Şifre</label>
          <input type="password" id="password" name="password" placeholder="Şifreni gir" required autocomplete="current-password" />
        </div>
        <button type="submit" class="login-btn">Giriş Yap</button>
        <p id="loginStatus" class="login-status" aria-live="polite"></p>
      </form>

      <a href="index.html" class="home-link">Ana sayfaya dön</a>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
