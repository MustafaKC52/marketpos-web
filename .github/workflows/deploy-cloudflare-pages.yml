# Secrets: repo → Settings → Secrets and variables → Actions
#   CLOUDFLARE_ACCOUNT_ID — Sağ üst Account ID (32 hex; yapıştırırken baş/son boşluk olmasın)
#   CLOUDFLARE_API_TOKEN  — Create Custom Token önerilir (hazır şablon yetmeyebilir):
#     Account → Cloudflare Pages → Edit
#     Account → Workers Scripts → Edit
#     Account → Account Settings → Read
#     Account resources: bu hesap veya All accounts
# Proje adı farklıysa env DEPLOY_PROJECT_NAME değiştirin.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PROJECT_NAME: marketpos-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Yayin klasorunu hazirla (downloads haric)
        run: |
          set -e
          rm -rf _publish
          mkdir -p _publish
          cp index.html style.css script.js demo.html demo.css demo.js _publish/
          cp _headers _publish/ 2>/dev/null || true
          cp _redirects _publish/ 2>/dev/null || true
          cp google57efe83289b4f48a.html sitemap.xml robots.txt favicon.svg _publish/ 2>/dev/null || true
          cp -r assets _publish/
          echo "=== _publish ozeti ==="
          find _publish -type f | wc -l
          du -sh _publish

      - name: Wrangler kimlik (token + account)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 whoami

      # Not: "pages project list" bazı tokenlarda ek izin ister veya API farklı davranır; deploy icin gerekli degil.

      - name: Cloudflare Pages deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy _publish --project-name="${DEPLOY_PROJECT_NAME}"
