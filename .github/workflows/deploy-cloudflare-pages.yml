# GitHub → Settings → Secrets and variables → Actions (repository secrets):
#   CLOUDFLARE_API_TOKEN  → Cloudflare Dashboard → My Profile → API Tokens → Create Token
#     Öneri: "Edit Cloudflare Workers" şablonu VEYA özel: Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID → Cloudflare ana sayfa sağ üst (Account ID)
# Pages proje adı farklıysa --project-name değerini Workers & Pages’teki isimle değiştirin.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Secret kontrolü
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          if [ -z "${TOKEN}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN tanımlı değil. Repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          if [ -z "${ACCOUNT}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID tanımlı değil (Cloudflare hesap özeti sayfasındaki 32 karakterlik ID)."
            exit 1
          fi
          echo "Gerekli secret'lar mevcut."

      - name: Cloudflare Pages deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy . --project-name=marketpos-web --branch=main
