# Gerekli repository secrets (isimler birebir böyle olmalı):
#   CLOUDFLARE_API_TOKEN   — Cloudflare → My Profile → API Tokens → Create Token
#                            ("Edit Cloudflare Workers" şablonu veya Account → Cloudflare Pages → Edit)
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare Dashboard sağ üst menü → kopyalanan Account ID (32 karakter)
# Eklemek için: GitHub repo → Settings → Secrets and variables → Actions → New repository secret
# Pages proje adı farklıysa aşağıdaki --project-name satırını değiştirin.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cloudflare Pages deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy . --project-name=marketpos-web --branch=main
