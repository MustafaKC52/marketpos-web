# Cloudflare'in Git bağlantısı bazen güncellemeyi almaz; bu workflow ana branch'i doğrudan Pages'e gönderir.
# GitHub → repo → Settings → Secrets and variables → Actions:
#   CLOUDFLARE_API_TOKEN   (Workers/Pages Edit izinli API token)
#   CLOUDFLARE_ACCOUNT_ID  (Cloudflare ana sayfa sağ alt köşe)
# Pages projesi adı farklıysa aşağıdaki --project-name değerini Cloudflare'deki isimle değiştirin.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=marketpos-web
