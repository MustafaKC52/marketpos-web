# Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID (repo → Settings → Actions)
# Proje adı Cloudflare’de farklıysa PROJECT_NAME ortam değişkeni veya aşağıdaki varsayılanı değiştirin.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # downloads/*.exe Cloudflare Pages limitini (dosya başı ~25MB) aşabilir; exe zaten dl.marketposs.com’da.
      - name: Yayin klasorunu hazirla
        run: |
          set -e
          rm -rf _publish
          mkdir -p _publish
          cp index.html style.css script.js demo.html demo.css demo.js _publish/
          cp _headers _publish/ 2>/dev/null || true
          cp _redirects _publish/ 2>/dev/null || true
          cp google57efe83289b4f48a.html sitemap.xml robots.txt favicon.svg _publish/ 2>/dev/null || true
          cp -r assets _publish/
          echo "Yuklenen dosyalar:" && find _publish -type f | head -80

      - name: Cloudflare Pages deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: marketpos-web
        run: |
          npx --yes wrangler@4 pages deploy _publish \
            --project-name="${PROJECT_NAME}" \
            --branch=main \
            --commit-hash="${{ github.sha }}" \
            --commit-dirty=false
