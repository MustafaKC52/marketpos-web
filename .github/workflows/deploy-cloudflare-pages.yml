# Secrets: repo → Settings → Secrets and variables → Actions
#   CLOUDFLARE_ACCOUNT_ID — Dashboard sağ üst Account ID (32 hex, boşluksuz)
#   CLOUDFLARE_API_TOKEN  — Custom token yeterli:
#     Account → Cloudflare Pages → Edit  (zorunlu)
#     Workers / User izni EKLEMEYIN: hesap veya token "yalnızca Pages" ise wrangler whoami
#     ve Workers API'leri hata verir; pages deploy ile alakası yoktur.
# Proje adı farklıysa DEPLOY_PROJECT_NAME değiştirin.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PROJECT_NAME: marketpos-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Yayin klasorunu hazirla (downloads haric)
        run: |
          set -e
          rm -rf _publish
          mkdir -p _publish
          cp index.html style.css script.js demo.html demo.css demo.js _publish/
          cp _headers _publish/ 2>/dev/null || true
          cp _redirects _publish/ 2>/dev/null || true
          cp google57efe83289b4f48a.html sitemap.xml robots.txt favicon.svg _publish/ 2>/dev/null || true
          cp -r assets _publish/
          echo "=== _publish ozeti ==="
          find _publish -type f | wc -l
          du -sh _publish

      # Not: wrangler whoami Workers/User API kullanir; "Cloudflare Pages only" hesaplarda token
      # bu API'lere yetkisiz kalir ve is akisi kirilir. Deploy icin gerekli degil.

      - name: Cloudflare Pages deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy _publish --project-name="${DEPLOY_PROJECT_NAME}"
