<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarketPos Web Demo</title>
  <meta name="description" content="MarketPos web demosunda ürün arama, sepete ekleme, ödeme alma ve toplam hesaplama akışını tarayıcıda deneyin." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.marketposs.com/demo.html" />
  <link rel="icon" href="assets/logo-app-icon.png?v=20260421" type="image/png" sizes="512x512" />
  <link rel="apple-touch-icon" href="assets/logo-app-icon.png?v=20260421" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="demo.css?v=20260421" />
</head>
<body>
  <div class="demo-bg demo-bg-one"></div>
  <div class="demo-bg demo-bg-two"></div>

  <header class="topbar">
    <a href="index.html" class="brand" aria-label="MarketPos Demo — ana sayfaya dön">
      <img src="assets/logo-lockup.png?v=20260421" alt="MarketPos" class="brand-logo" width="200" height="56" />
      <span class="brand-demo-suffix">Demo</span>
    </a>
    <div class="topbar-actions">
      <button id="resetDemo" class="btn ghost">Demoyu Sıfırla</button>
    </div>
  </header>

  <main class="layout">
    <section class="catalog card">
      <div class="card-head">
        <h1>Hızlı Satış Ekranı</h1>
        <p>Ürün seç, sepete ekle, ödemeyi tamamla.</p>
      </div>

      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Ürün adı veya barkod ara" />
        <select id="categoryFilter">
          <option value="all">Tüm kategoriler</option>
          <option value="Temel Gıda">Temel Gıda</option>
          <option value="İçecek">İçecek</option>
          <option value="Atıştırmalık">Atıştırmalık</option>
          <option value="Temizlik">Temizlik</option>
        </select>
      </div>

      <div id="productGrid" class="product-grid"></div>
    </section>

    <aside class="checkout card">
      <div class="card-head">
        <h2>Sepet</h2>
        <p id="cartMeta">0 ürün</p>
      </div>

      <div id="cartList" class="cart-list"></div>

      <div class="totals">
        <div><span>Ara Toplam</span><strong id="subtotal">₺0,00</strong></div>
        <div><span>KDV (%18)</span><strong id="tax">₺0,00</strong></div>
        <div class="grand"><span>Genel Toplam</span><strong id="total">₺0,00</strong></div>
      </div>

      <div class="payment">
        <label><input type="radio" name="pay" value="Nakit" checked /> Nakit</label>
        <label><input type="radio" name="pay" value="Kart" /> Kart</label>
        <label><input type="radio" name="pay" value="Karma" /> Karma</label>
      </div>

      <button id="checkoutBtn" class="btn primary full">Ödeme Al</button>
      <p id="checkoutStatus" class="status" aria-live="polite"></p>
    </aside>
  </main>

  <script src="demo.js?v=20260421"></script>
</body>
</html>
